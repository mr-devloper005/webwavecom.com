services:
  ww6m2q8x4v:
    container_name: ww6m2q8x4v_app
    image: ghcr.io/mr-devloper005/webwavecom.com:latest
    env_file:
      - .env
    network_mode: bridge
    restart: always
    ports:
      - "127.0.0.1:3084:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 5m
      timeout: 3s
      retries: 2
